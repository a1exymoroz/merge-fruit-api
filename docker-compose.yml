services:
  postgres:
    image: postgres:16-alpine
    container_name: mergefruit-db
    env_file:
      - .env.local
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - mergefruit_pg_data:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    container_name: mergefruit-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

volumes:
  mergefruit_pg_data:
