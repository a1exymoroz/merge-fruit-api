# Activate with: SPRING_PROFILES_ACTIVE=prod
spring:
  config:
    import: optional:file:.env.prod[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    org.hibernate.SQL: WARN
